apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-com-probes
  labels:
    app: app-com-probes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-com-probes
  template:
    metadata:
      labels:
        app: app-com-probes
    spec:
      containers:
      - name: app
        image: nginx:alpine
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
