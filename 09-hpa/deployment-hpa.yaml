apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-hpa
  labels:
    app: app-hpa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-hpa
  template:
    metadata:
      labels:
        app: app-hpa
    spec:
      containers:
      - name: app
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
